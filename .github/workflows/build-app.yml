name: Build Desktop App

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: macos-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-darwin,x86_64-apple-darwin

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: app/src-tauri

      - name: Install root dependencies
        run: npm ci

      - name: Install app dependencies
        run: cd app && npm ci

      - name: Build sidecars
        run: |
          mkdir -p app/src-tauri/binaries
          bun build --compile --target=bun-darwin-arm64 \
            tools/poster-qr/sidecar.ts \
            --outfile app/src-tauri/binaries/poster-qr-sidecar-aarch64-apple-darwin
          bun build --compile --target=bun-darwin-x64 \
            tools/poster-qr/sidecar.ts \
            --outfile app/src-tauri/binaries/poster-qr-sidecar-x86_64-apple-darwin
          lipo -create \
            app/src-tauri/binaries/poster-qr-sidecar-aarch64-apple-darwin \
            app/src-tauri/binaries/poster-qr-sidecar-x86_64-apple-darwin \
            -output app/src-tauri/binaries/poster-qr-sidecar-universal-apple-darwin

      - name: Build Tauri app
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          projectPath: app
          args: --target universal-apple-darwin
          tagName: ${{ github.ref_name }}
          releaseName: 'Poster QR ${{ github.ref_name }}'
          releaseBody: 'Download the .dmg for your Mac.'
          releaseDraft: true
